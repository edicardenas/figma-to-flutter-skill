name: Validate Skill

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skill structure
        run: ./scripts/validate-skill.sh

      - name: Build skill archive
        run: ./scripts/build-skill.sh
